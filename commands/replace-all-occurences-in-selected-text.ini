[Command]
Name=Replace in Selection
Command="
    copyq:
    // Copy without changing selection buffer on Linux
    function copyWithoutSelectionLinux() {
      const copy_clipboard = config('copy_clipboard');
      config('copy_clipboard', false);
      try {
        copy.apply(this, arguments);
      } finally {
        config('copy_clipboard', copy_clipboard);
      }
    }

    const copyWithoutSelection = info('platform').includes('Linux')
        ? copyWithoutSelectionLinux : copy;

    copyWithoutSelection();
    const text = str(clipboard());

    const r1 = 'Text';
    const r2 = 'Replace with';
    const reply = dialog(
        '.title', 'Replace a text with a regular expression',
        r1, '', r2, '');

    if (reply) {
      const regex = new RegExp(reply[r1], 'g');
      copyWithoutSelection(text.replace(regex, reply[r2]));
      paste();
    }"
Icon=\xf040
GlobalShortcut=Meta+Alt+R
IsGlobalShortcut=true
